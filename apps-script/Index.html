<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root{
      --bg:#0f1420; --card:#1a2233; --line:#2a3450; --text:#e7ecf5;
      --muted:#9aa8c2; --accent:#5b8cff; --accent2:#39d98a; --chip:#232d44;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg);color:var(--text);padding:16px;}
    h1{font-size:20px;margin:0 0 4px}
    .sub{color:var(--muted);font-size:13px;margin-bottom:16px}
    .filters{display:flex;flex-wrap:wrap;gap:10px;align-items:end;
      background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:16px}
    .fld{display:flex;flex-direction:column;gap:4px}
    .fld label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
    select,input{background:#0e1524;color:var(--text);border:1px solid var(--line);
      border-radius:8px;padding:8px 10px;font-size:14px;min-width:130px}
    button{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:9px 16px;
      font-size:14px;cursor:pointer;font-weight:600}
    button.ghost{background:var(--chip);color:var(--text)}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
    .card .k{color:var(--muted);font-size:12px}
    .card .v{font-size:22px;font-weight:700;margin-top:4px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
    @media(max-width:820px){.grid2{grid-template-columns:1fr}}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
    .panel h3{margin:0 0 10px;font-size:14px;color:var(--muted);font-weight:600}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line)}
    th{color:var(--muted);font-weight:600;position:sticky;top:0;background:var(--card)}
    td.amt,th.amt{text-align:right;font-variant-numeric:tabular-nums}
    .tablewrap{max-height:420px;overflow:auto}
    .chip{display:inline-block;background:var(--chip);border-radius:20px;padding:2px 10px;font-size:12px}
    a{color:var(--accent)}
    .loading{color:var(--muted);padding:30px;text-align:center}
    .err{color:#ff8080}
  </style>
</head>
<body>
  <h1>💰 Expense Dashboard</h1>
  <div class="sub" id="sub">Loading data…</div>

  <div class="filters" id="filters" style="display:none">
    <div class="fld">
      <label>Person</label>
      <select id="fPerson"><option value="">All people</option></select>
    </div>
    <div class="fld">
      <label>Month</label>
      <select id="fMonth"><option value="">All months</option></select>
    </div>
    <div class="fld">
      <label>Single day</label>
      <input type="date" id="fDay">
    </div>
    <div class="fld">
      <label>From</label>
      <input type="date" id="fFrom">
    </div>
    <div class="fld">
      <label>To</label>
      <input type="date" id="fTo">
    </div>
    <button id="btnReset" class="ghost">Reset</button>
  </div>

  <div id="dash" style="display:none">
    <div class="cards">
      <div class="card"><div class="k">Total Spent</div><div class="v" id="cTotal">₹0</div></div>
      <div class="card"><div class="k">Entries</div><div class="v" id="cCount">0</div></div>
      <div class="card"><div class="k">Top Spender</div><div class="v" id="cTop">—</div></div>
      <div class="card"><div class="k">Avg / entry</div><div class="v" id="cAvg">₹0</div></div>
    </div>

    <div class="grid2">
      <div class="panel"><h3>Spend by person</h3><canvas id="chPerson" height="200"></canvas></div>
      <div class="panel"><h3>Spend by category</h3><canvas id="chCat" height="200"></canvas></div>
    </div>
    <div class="panel" style="margin-bottom:16px"><h3>Spend by month</h3><canvas id="chMonth" height="140"></canvas></div>

    <div class="grid2">
      <div class="panel">
        <h3>Per-person totals</h3>
        <div class="tablewrap"><table id="tblPerson"><thead><tr><th>Person</th><th class="amt">Spent</th><th class="amt">Entries</th></tr></thead><tbody></tbody></table></div>
      </div>
      <div class="panel">
        <h3>Transactions <span class="chip" id="txnCount">0</span></h3>
        <div class="tablewrap"><table id="tblTxn"><thead><tr><th>Date</th><th>Person</th><th>Category</th><th class="amt">Amount</th></tr></thead><tbody></tbody></table></div>
      </div>
    </div>
  </div>

  <div class="loading" id="loading">Fetching your expenses…</div>

<script>
  var ALL = [];
  var charts = {};

  function inr(n){ return '₹' + (Math.round(n*100)/100).toLocaleString('en-IN'); }

  google.script.run.withSuccessHandler(onData).withFailureHandler(onErr).getData();

  function onErr(e){
    document.getElementById('loading').innerHTML =
      '<span class="err">Could not load data: ' + e.message + '</span>';
  }

  function onData(res){
    if(res.error){ onErr({message:res.error}); return; }
    ALL = res.rows || [];
    document.getElementById('loading').style.display='none';
    document.getElementById('filters').style.display='flex';
    document.getElementById('dash').style.display='block';
    document.getElementById('sub').textContent =
      ALL.length + ' total entries • updated live from your sheet';

    // populate person + month dropdowns
    var people = Array.from(new Set(ALL.map(function(r){return r.name;}))).sort();
    var months = Array.from(new Set(ALL.map(function(r){return r.date? r.date.slice(0,7):'';}).filter(Boolean))).sort().reverse();
    var pSel=document.getElementById('fPerson'), mSel=document.getElementById('fMonth');
    people.forEach(function(p){ pSel.add(new Option(p,p)); });
    months.forEach(function(m){ mSel.add(new Option(m,m)); });

    ['fPerson','fMonth','fDay','fFrom','fTo'].forEach(function(id){
      document.getElementById(id).addEventListener('change', render);
    });
    document.getElementById('btnReset').addEventListener('click', function(){
      ['fPerson','fMonth','fDay','fFrom','fTo'].forEach(function(id){ document.getElementById(id).value=''; });
      render();
    });
    render();
  }

  function render(){
    var person=document.getElementById('fPerson').value;
    var month=document.getElementById('fMonth').value;
    var day=document.getElementById('fDay').value;
    var from=document.getElementById('fFrom').value;
    var to=document.getElementById('fTo').value;

    var rows = ALL.filter(function(r){
      if(person && r.name!==person) return false;
      // date filter priority: range > single day > month
      if(from && to){ if(!(r.date>=from && r.date<=to)) return false; }
      else if(from){ if(!(r.date>=from)) return false; }
      else if(to){ if(!(r.date<=to)) return false; }
      else if(day){ if(r.date!==day) return false; }
      else if(month){ if(r.date.slice(0,7)!==month) return false; }
      return true;
    });

    var total = rows.reduce(function(s,r){return s+r.amount;},0);
    document.getElementById('cTotal').textContent = inr(total);
    document.getElementById('cCount').textContent = rows.length;
    document.getElementById('cAvg').textContent = inr(rows.length? total/rows.length : 0);

    // per-person totals
    var byPerson = groupSum(rows, 'name');
    var topName = Object.keys(byPerson).sort(function(a,b){return byPerson[b].sum-byPerson[a].sum;})[0];
    document.getElementById('cTop').textContent = topName ? topName : '—';

    fillPersonTable(byPerson);
    fillTxnTable(rows);

    // charts
    drawBar('chPerson', Object.keys(byPerson), Object.keys(byPerson).map(function(k){return byPerson[k].sum;}), '#5b8cff');
    var byCat = groupSum(rows,'category');
    drawPie('chCat', Object.keys(byCat), Object.keys(byCat).map(function(k){return byCat[k].sum;}));
    var byMonth = {};
    rows.forEach(function(r){ var m=r.date?r.date.slice(0,7):'—'; byMonth[m]=(byMonth[m]||0)+r.amount; });
    var mk=Object.keys(byMonth).sort();
    drawBar('chMonth', mk, mk.map(function(k){return byMonth[k];}), '#39d98a');
  }

  function groupSum(rows,key){
    var o={}; rows.forEach(function(r){ var k=r[key]||'—'; if(!o[k])o[k]={sum:0,n:0}; o[k].sum+=r.amount; o[k].n++; }); return o;
  }

  function fillPersonTable(byPerson){
    var tb=document.querySelector('#tblPerson tbody'); tb.innerHTML='';
    Object.keys(byPerson).sort(function(a,b){return byPerson[b].sum-byPerson[a].sum;}).forEach(function(p){
      var tr=document.createElement('tr');
      tr.innerHTML='<td>'+esc(p)+'</td><td class="amt">'+inr(byPerson[p].sum)+'</td><td class="amt">'+byPerson[p].n+'</td>';
      tb.appendChild(tr);
    });
  }

  function fillTxnTable(rows){
    var tb=document.querySelector('#tblTxn tbody'); tb.innerHTML='';
    document.getElementById('txnCount').textContent=rows.length;
    rows.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');}).forEach(function(r){
      var tr=document.createElement('tr');
      tr.innerHTML='<td>'+esc(r.date||'—')+'</td><td>'+esc(r.name)+'</td><td><span class="chip">'+esc(r.category)+'</span></td><td class="amt">'+inr(r.amount)+'</td>';
      tb.appendChild(tr);
    });
  }

  function drawBar(id,labels,data,color){
    if(charts[id]) charts[id].destroy();
    charts[id]=new Chart(document.getElementById(id),{
      type:'bar',
      data:{labels:labels,datasets:[{data:data,backgroundColor:color,borderRadius:6}]},
      options:{plugins:{legend:{display:false}},scales:gridOpts(),responsive:true,maintainAspectRatio:false}
    });
  }
  function drawPie(id,labels,data){
    if(charts[id]) charts[id].destroy();
    var palette=['#5b8cff','#39d98a','#ffb454','#ff6b6b','#b980ff','#4dd0e1','#f06292','#a5d6a7','#ffd54f','#90caf9','#ce93d8','#80cbc4'];
    charts[id]=new Chart(document.getElementById(id),{
      type:'doughnut',
      data:{labels:labels,datasets:[{data:data,backgroundColor:palette}]},
      options:{plugins:{legend:{position:'right',labels:{color:'#9aa8c2',boxWidth:12}}},responsive:true,maintainAspectRatio:false}
    });
  }
  function gridOpts(){
    return {x:{ticks:{color:'#9aa8c2'},grid:{color:'#2a3450'}},
            y:{ticks:{color:'#9aa8c2'},grid:{color:'#2a3450'}}};
  }
  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
</script>
</body>
</html>
